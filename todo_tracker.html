<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 待办事项追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;padding:24px}
.container{max-width:760px;margin:0 auto}
h1{text-align:center;font-size:28px;font-weight:700;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{text-align:center;color:#9ca3af;font-size:14px;margin-bottom:28px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px}
.tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.25s;color:#9ca3af}
.tab.active{background:rgba(96,165,250,0.15);color:#60a5fa}
.tab:hover:not(.active){color:#d1d5db}
.stats-bar{display:flex;gap:10px;margin-bottom:24px}
.stat-card{flex:1;background:rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;text-align:center;border:1px solid rgba(255,255,255,0.08)}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .label{font-size:11px;color:#9ca3af;margin-top:2px}
.stat-card.pending .num{color:#fbbf24}
.stat-card.done .num{color:#34d399}
.stat-card.dated .num{color:#a78bfa}
.stat-card.total .num{color:#60a5fa}
.progress-wrap{background:rgba(255,255,255,0.08);border-radius:8px;height:6px;margin-bottom:28px;overflow:hidden}
.progress-bar{height:100%;border-radius:8px;transition:width 0.5s ease;background:linear-gradient(90deg,#34d399,#60a5fa)}
.panel{display:none}.panel.active{display:block}
.site-section{background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid rgba(255,255,255,0.08);margin-bottom:20px;overflow:hidden}
.site-header{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.site-header .icon{font-size:20px}.site-header .name{font-size:15px;font-weight:600}
.site-header .count{margin-left:auto;font-size:12px;color:#9ca3af;background:rgba(255,255,255,0.06);padding:2px 10px;border-radius:12px}
.todo-item{display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:default;transition:background 0.2s;user-select:none}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:rgba(255,255,255,0.03)}
.todo-item.done{opacity:0.6}
.todo-item.done .todo-text{text-decoration:line-through;color:#6b7280}
.checkbox{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid #4b5563;display:flex;align-items:center;justify-content:center;transition:all 0.25s;margin-top:1px;cursor:pointer}
.todo-item.done .checkbox{background:linear-gradient(135deg,#34d399,#60a5fa);border-color:transparent}
.checkbox svg{width:14px;height:14px;opacity:0;transition:opacity 0.2s}
.todo-item.done .checkbox svg{opacity:1}
.todo-content{flex:1;min-width:0}
.todo-text{font-size:14px;line-height:1.6;transition:all 0.3s;word-break:break-word}
.todo-tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:4px;margin-top:6px;margin-right:4px}
.tag-urgent{background:rgba(239,68,68,0.15);color:#f87171}
.tag-date{background:rgba(167,139,250,0.15);color:#a78bfa}
.tag-blocked{background:rgba(251,191,36,0.15);color:#fbbf24}
.tag-new{background:rgba(52,211,153,0.15);color:#34d399}
.completed-time{font-size:11px;color:#6b7280;margin-top:4px}
.confirm-btn{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);cursor:pointer;margin-top:6px;transition:all 0.2s;font-family:inherit}
.confirm-btn:hover{background:rgba(52,211,153,0.25);border-color:rgba(52,211,153,0.5)}
.item-actions{display:flex;gap:4px;opacity:0.2;transition:opacity 0.2s;flex-shrink:0;align-self:center}
.todo-item:hover .item-actions,.tl-todo:hover .item-actions{opacity:1}
@media(hover:none){.item-actions{opacity:0.6}}
.action-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.06);transition:all 0.2s;font-size:13px;border:none;color:inherit}
.action-btn:hover{background:rgba(255,255,255,0.15)}
.action-btn.del:hover{background:rgba(239,68,68,0.2)}
.archive-section{margin-top:24px;background:rgba(255,255,255,0.02);border-radius:16px;border:1px solid rgba(255,255,255,0.06);overflow:hidden}
.archive-header{padding:12px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background 0.2s}
.archive-header:hover{background:rgba(255,255,255,0.03)}
.archive-header .icon{font-size:16px}
.archive-header .name{font-size:14px;font-weight:600;color:#9ca3af}
.archive-header .count{margin-left:auto;font-size:12px;color:#6b7280;background:rgba(255,255,255,0.04);padding:2px 10px;border-radius:12px}
.archive-header .toggle{font-size:12px;color:#6b7280;transition:transform 0.2s}
.archive-header .toggle.collapsed{transform:rotate(-90deg)}
.archive-body{border-top:1px solid rgba(255,255,255,0.04)}
.archive-body.hidden{display:none}
.archive-item{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.archive-item:last-child{border-bottom:none}
.archive-item .text{flex:1;color:#6b7280;text-decoration:line-through}
.archive-item .meta{font-size:11px;color:#4b5563;flex-shrink:0}
.archive-item .undo-btn{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);cursor:pointer;transition:all 0.2s;font-family:inherit}
.archive-item .undo-btn:hover{background:rgba(96,165,250,0.2)}
.timeline{position:relative;padding-left:40px}
.timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.1)}
.tl-group{margin-bottom:24px;position:relative}
.tl-dot{position:absolute;left:-33px;top:8px;width:12px;height:12px;border-radius:50%;border:2px solid #4b5563;background:#1f2937;z-index:1}
.tl-dot.today{border-color:#34d399;background:#34d399;box-shadow:0 0 8px rgba(52,211,153,0.4)}
.tl-dot.future{border-color:#a78bfa;background:rgba(167,139,250,0.2)}
.tl-dot.past{border-color:#6b7280}
.tl-date{font-size:13px;font-weight:600;color:#9ca3af;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tl-date .today-badge{font-size:11px;background:rgba(52,211,153,0.15);color:#34d399;padding:1px 8px;border-radius:4px}
.tl-date .due{font-size:11px;background:rgba(239,68,68,0.15);color:#f87171;padding:1px 8px;border-radius:4px;margin-left:auto}
.tl-date .scheduled{font-size:11px;background:rgba(59,130,246,0.15);color:#60a5fa;padding:1px 8px;border-radius:4px;margin-left:auto}
.tl-card{background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.08);overflow:hidden}
.tl-todo{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:default;user-select:none;transition:background 0.2s}
.tl-todo:last-child{border-bottom:none}
.tl-todo:hover{background:rgba(255,255,255,0.03)}
.tl-todo.done{opacity:0.5}
.tl-todo.done .tl-text{text-decoration:line-through;color:#6b7280}
.tl-checkbox{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:2px solid #4b5563;display:flex;align-items:center;justify-content:center;transition:all 0.25s;margin-top:2px;cursor:pointer}
.tl-todo.done .tl-checkbox{background:linear-gradient(135deg,#34d399,#60a5fa);border-color:transparent}
.tl-checkbox svg{width:12px;height:12px;opacity:0}
.tl-todo.done .tl-checkbox svg{opacity:1}
.tl-text{font-size:13px;line-height:1.5;flex:1;word-break:break-word}
.tl-site{font-size:11px;color:#6b7280;margin-top:2px}
.tl-confirm{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);cursor:pointer;margin-top:4px;transition:all 0.2s;font-family:inherit;display:inline-block}
.tl-confirm:hover{background:rgba(52,211,153,0.25)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal-content{background:#1f2937;border-radius:16px;padding:24px;width:90%;max-width:400px;border:1px solid rgba(255,255,255,0.1);animation:modalIn 0.2s ease}
@keyframes modalIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-content h3{font-size:18px;margin-bottom:16px;color:#e0e0e0}
.modal-content label{font-size:13px;color:#9ca3af;display:block;margin-bottom:4px;margin-top:12px}
.modal-content label:first-of-type{margin-top:0}
.modal-content input,.modal-content select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#e0e0e0;font-size:14px;outline:none;font-family:inherit}
.modal-content input:focus,.modal-content select:focus{border-color:#60a5fa}
.modal-content select option{background:#1f2937;color:#e0e0e0}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:white}
.btn-primary:hover{opacity:0.9}
.btn-secondary{background:rgba(255,255,255,0.08);color:#9ca3af}
.btn-secondary:hover{background:rgba(255,255,255,0.12)}
.add-btn{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px dashed rgba(96,165,250,0.3);padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;transition:all 0.2s;font-family:inherit}
.add-btn:hover{background:rgba(96,165,250,0.2);border-color:rgba(96,165,250,0.5)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 20px;display:none;align-items:center;gap:12px;z-index:1001;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{display:flex}
.toast-text{font-size:14px;color:#e0e0e0}
.toast-undo{background:rgba(96,165,250,0.15);color:#60a5fa;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s}
.toast-undo:hover{background:rgba(96,165,250,0.25)}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#6b7280}
.footer a{color:#60a5fa;cursor:pointer;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <h1>📋 待办事项追踪</h1>
  <div class="subtitle">勾选完成 → 确认归档 · 未确认归档的任务次日仍会提醒</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('list')">📌 今日待办</div>
    <div class="tab" onclick="switchTab('calendar')">📅 日历时间线</div>
  </div>
  <div class="stats-bar">
    <div class="stat-card pending"><div class="num" id="pendingNum">0</div><div class="label">待处理</div></div>
    <div class="stat-card done"><div class="num" id="doneNum">0</div><div class="label">已确认完成</div></div>
    <div class="stat-card dated"><div class="num" id="datedNum">0</div><div class="label">有截止日</div></div>
    <div class="stat-card total"><div class="num" id="totalNum">0</div><div class="label">全部</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="panel active" id="listPanel"></div>
  <div class="panel" id="calendarPanel"></div>
  <div class="footer">数据自动保存到本地 · <a onclick="resetAll()">重置为默认</a> · <a onclick="pullFromGist()" style="color:#4fc3f7">⬇️ 拉取归档</a> · <a onclick="pushToGist()" style="color:#81c784">⬆️ 推送归档</a> · <a onclick="openTokenSettings()" style="color:#ffb74d">⚙️ 设置Token</a></div>
</div>

<div id="editModal" class="modal-overlay">
  <div class="modal-content">
    <h3>✏️ 编辑待办</h3>
    <label>描述</label>
    <input type="text" id="editText" placeholder="待办事项描述">
    <label>分类</label>
    <select id="editSite"><option value="射阳港现场">🏭 射阳港现场</option><option value="中核武汉现场">🏭 中核武汉现场</option><option value="论文进度">📝 论文进度</option><option value="其他">📌 其他</option></select>
    <label>截止日期（留空则为日常待办）</label>
    <input type="date" id="editDeadline">
    <label>备注</label>
    <input type="text" id="editNote" placeholder="备注信息（日历时间线中显示）">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEdit()">取消</button>
      <button class="btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div id="addModal" class="modal-overlay">
  <div class="modal-content">
    <h3>➕ 添加待办</h3>
    <label>描述 *</label>
    <input type="text" id="addText" placeholder="待办事项描述">
    <label>分类</label>
    <select id="addSite"><option value="射阳港现场">🏭 射阳港现场</option><option value="中核武汉现场">🏭 中核武汉现场</option><option value="论文进度">📝 论文进度</option><option value="其他">📌 其他</option></select>
    <label>截止日期（留空则为日常待办）</label>
    <input type="date" id="addDeadline">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAdd()">取消</button>
      <button class="btn-primary" onclick="saveAdd()">添加</button>
    </div>
  </div>
</div>

<div id="pushModal" class="modal-overlay">
  <div class="modal-content" style="max-width:460px">
    <h3>📋 推送归档到云端</h3>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:10px" id="pushCount"></p>
    <div id="pushList" style="max-height:240px;overflow-y:auto;background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.8"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closePushConfirm()">取消</button>
      <button class="btn-primary" onclick="doPush()">确认推送</button>
    </div>
  </div>
</div>

<div id="tokenModal" class="modal-overlay">
  <div class="modal-content">
    <h3>⚙️ GitHub Token 设置</h3>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:12px">Token仅保存在浏览器本地，用于拉取/推送归档到GitHub Gist。需要gist权限的Classic Token。</p>
    <label>GitHub Classic Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeTokenSettings()">取消</button>
      <button class="btn-primary" onclick="saveTokenSettings()">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  <span class="toast-text" id="toastText"></span>
  <button class="toast-undo" onclick="undoDelete()">撤销</button>
</div>

<script>
/* ===== DATA ===== */
/* 仅保留活跃待办；已归档/删除的任务由Gist管理，首次加载自动同步 */
const DEFAULT_TODOS=[
  {id:'sy2',text:'模型核查程序在国产化平台缺失点排查',site:'射阳港现场',siteIcon:'🏭',type:'dated',deadline:'2026-06-30',note:'对比国产化平台与标准环境依赖差异'},
  {id:'paper3',text:'整理数据，深度剖析冷端系统',site:'论文进度',siteIcon:'📝',tag:'📋 进行中',tagClass:'tag-new',type:'daily'}
];

const SITE_ICONS={'射阳港现场':'🏭','中核武汉现场':'🏭','论文进度':'📝','其他':'📌'};
const SK='todo_tracker_v6';

/* ===== STATE ===== */
function load(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function save(s){localStorage.setItem(SK,JSON.stringify(s))}

// Migrate from v5 only (no hardcoded seeding - Gist is source of truth)
(function(){
  const v5k='todo_tracker_v5',v6k=SK;
  if(localStorage.getItem(v5k)&&!localStorage.getItem(v6k)){
    try{
      const o=JSON.parse(localStorage.getItem(v5k)),n={done:{},doneTime:{},confirmedDone:{},migrated:true};
      for(const[id,d]of Object.entries(o.done||{})){n.done[id]=true;n.doneTime[id]=o.doneTime[id]||''}
      save(n);
    }catch{}
  }
})();

function getActive(){
  const s=load();
  const cd=s.confirmedDone||{};
  const confirmed=new Set(Object.keys(cd));
  const all=[...DEFAULT_TODOS,...(s.addedItems||[])];
  const del=new Set((s.deleted||[]).map(d=>typeof d==='string'?d:d.id));
  const ov=s.itemOverrides||{};
  return all.filter(i=>!del.has(i.id)&&!confirmed.has(i.id)).map(i=>({...i,...(ov[i.id]||{})}));
}
function getConfirmedItems(){
  const s=load();
  const cd=s.confirmedDone||{};
  const all=[...DEFAULT_TODOS,...(s.addedItems||[])];
  const byId={};all.forEach(i=>byId[i.id]=i);
  const result=[];
  for(const[id,entry]of Object.entries(cd)){
    // Handle both old format (string date) and new format ({date, text})
    const date=typeof entry==='string'?entry:(entry.date||'');
    const text=typeof entry==='object'?entry.text:(byId[id]?byId[id].text:'');
    const site=byId[id]?byId[id].site:'';
    const siteIcon=byId[id]?byId[id].siteIcon:'';
    result.push({id,text:text||id,site,siteIcon,confirmedDate:date});
  }
  return result.sort((a,b)=>b.confirmedDate.localeCompare(a.confirmedDate));
}
function getById(id){const s=load();const all=[...DEFAULT_TODOS,...(s.addedItems||[])];return all.find(i=>i.id===id)}
function isDone(id){const s=load();return s.done&&s.done[id]}
function doneTime(id){const s=load();return s.doneTime&&s.doneTime[id]||''}
function isConfirmed(id){const s=load();return !!(s.confirmedDone||{})[id]}
function getConfirmedDate(id){const s=load();const e=(s.confirmedDone||{})[id];if(!e)return'';return typeof e==='string'?e:(e.date||'')}
function getTag(item){
  if(item.deadline){const d=parseD(item.deadline);return{text:`📅 ${d.getMonth()+1}/${d.getDate()}到期`,cls:'tag-date'}}
  if(item.tag)return{text:item.tag,cls:item.tagClass||''};
  return null;
}

/* ===== RENDER ===== */
function render(){renderList();renderCalendar();updateStats()}

function renderList(){
  const today=new Date();today.setHours(0,0,0,0);
  const items=getActive().filter(t=>{
    if(t.type==='daily')return true;
    if(t.type==='dated'&&t.deadline){
      const diff=Math.round((parseD(t.deadline)-today)/864e5);
      return diff<=0;
    }
    return false;
  });
  const groups={};
  items.forEach(i=>{const k=i.site;if(!groups[k])groups[k]=[];groups[k].push(i)});
  let h='';
  for(const[site,si]of Object.entries(groups)){
    const icon=si[0].siteIcon||SITE_ICONS[site]||'📌';
    const dc=si.filter(i=>isDone(i.id)).length;
    h+=`<div class="site-section"><div class="site-header"><span class="icon">${icon}</span><span class="name">${site}</span><span class="count">${dc}/${si.length}</span></div>`;
    si.forEach(i=>{h+=renderLI(i)});
    h+='</div>'
  }
  if(!items.length)h+='<div style="text-align:center;padding:40px;color:#6b7280">🎉 今日无待办</div>';
  h+=`<div style="text-align:center;margin-top:16px"><button class="add-btn" onclick="openAdd('daily')">＋ 添加日常待办</button></div>`;
  h+='<div style="text-align:center;margin-top:8px;font-size:12px;color:#6b7280">📅 远期有截止日的任务请在「日历时间线」中查看</div>';

  // 归档区
  const archived=getConfirmedItems();
  if(archived.length){

    archived.forEach(i=>{
      const cd=i.confirmedDate||'';
      h+=`<div class="archive-item"><span class="text">${esc(i.text)}</span><span class="meta">${cd} 完成</span><button class="undo-btn" onclick="undoConfirm('${i.id}')">恢复</button></div>`;

function renderLI(item){

function renderCalendar(){

function renderTI(item){
  const d=isDone(item.id),icon=item.siteIcon||SITE_ICONS[item.site]||'📌';
  const txt=esc(item.text),sub=item.note?`${icon} ${item.site} · ${esc(item.note)}`:`${icon} ${item.site}`;
  const confirmHtml=d?`<span class="tl-confirm" onclick="confirmDone('${item.id}')">✓ 确认归档</span>`:'';
  return`<div class="tl-todo${d?' done':''}" data-id="${item.id}">
    <div class="tl-checkbox" onclick="toggle('${item.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div style="flex:1;min-width:0"><div class="tl-text">${txt}</div><div class="tl-site">${sub}</div>${confirmHtml}</div>

  </div>`;

function getTimelineDates(){
  const today=new Date();today.setHours(0,0,0,0);
  const dates=[],dm={};
  const daily=getActive().filter(t=>t.type==='daily');
  if(daily.length)dates.push({date:today,label:fmtLabel(today),isToday:true,isPast:false,badge:'<span class="today-badge">今天</span>',type:'daily',items:daily});
  const dated=getActive().filter(t=>t.type==='dated'&&t.deadline);
  dated.forEach(item=>{
    const dl=parseD(item.deadline),diff=Math.round((dl-today)/864e5);
    if(!dm[item.deadline]){
      let badge;
      if(diff<0)badge='<span class="due" style="background:rgba(239,68,68,0.25)">已过期</span>';
      else if(diff===0)badge='<span class="due">今天到期</span>';
      else if(diff===1)badge='<span class="scheduled">📅 明日到期</span>';
      else badge='<span class="due">到期日</span>';
      dm[item.deadline]={date:dl,label:fmtLabel(dl),isToday:diff===0,isPast:diff<0,badge,type:'due',items:[]};
    }
    dm[item.deadline].items.push(item);
  });
  return dates.concat(Object.values(dm).sort((a,b)=>a.date-b.date));
}

function updateStats(){
  const all=getActive(),dated=all.filter(t=>t.type==='dated');
  const confirmedCount=getConfirmedItems().length;
  const checkedCount=all.filter(i=>isDone(i.id)).length;
  const pendingCount=all.length-checkedCount;
  document.getElementById('pendingNum').textContent=pendingCount;
  document.getElementById('doneNum').textContent=confirmedCount;
  document.getElementById('datedNum').textContent=dated.length;
  document.getElementById('totalNum').textContent=all.length+confirmedCount;
  const total=all.length+confirmedCount;
  document.getElementById('progressBar').style.width=(total?((confirmedCount+checkedCount)/total*100):0)+'%';
}

// Confirm done (archive)
function confirmDone(id){
  const s=load();if(!s.confirmedDone)s.confirmedDone={};
  const today=new Date();const ds=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  // Store {date, text} so archived items can display even after removal from DEFAULT_TODOS
  const item=getById(id);
  s.confirmedDone[id]={date:ds,text:item?item.text:''};
  // Also mark as done
  if(!s.done)s.done={};if(!s.doneTime)s.doneTime={};
  s.done[id]=true;s.doneTime[id]=new Date().toLocaleString('zh-CN');
  save(s);render();showToast('已归档，不再提醒');
}

  if(s.done)delete s.done[id];
  if(s.doneTime)delete s.doneTime[id];
  save(s);render();showToast('已恢复为待办（注意：该任务已不在默认列表中，需重新添加）');

/* ===== GIST SYNC ===== */
const GIST_ID='deb7341be0163952be9a4840fc8a68d6';
const GIST_FILE='confirmed_done.json';
const GIST_DELETED_FILE='deleted_items.json';
function getGistToken(){return localStorage.getItem('todo_gist_token')||''}

async function pullFromGist(){
  const token=getGistToken();if(!token){alert('⚠️ 请先点击底部「⚙️ 设置Token」配置GitHub Token');return}
  try{
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{'Authorization':`token ${token}`}});
    const d=await r.json();
    const s=load();
    const all=[...DEFAULT_TODOS,...(s.addedItems||[])];
    const byId={};all.forEach(i=>byId[i.id]=i);
    // Pull confirmed_done (handle both old string format and new {date,text} format)
    if(d.files[GIST_FILE]){
      const remote=JSON.parse(d.files[GIST_FILE].content);
      if(!s.confirmedDone)s.confirmedDone={};
      for(const[id,entry]of Object.entries(remote)){
        if(!s.confirmedDone[id]){
          // New format: {date, text}; Old format: just a date string
          if(typeof entry==='object'){
            s.confirmedDone[id]=entry;
          }else{
            const text=byId[id]?byId[id].text:id;
            s.confirmedDone[id]={date:entry,text};
          }
        }
      }
    }
    // Pull deleted_items (handle both old string format and new {id,text} format)
    if(d.files[GIST_DELETED_FILE]){
      const remoteDel=JSON.parse(d.files[GIST_DELETED_FILE].content);
      if(!s.deleted)s.deleted=[];
      remoteDel.forEach(d=>{
        const did=typeof d==='string'?d:d.id;
        if(!s.deleted.some(x=>(typeof x==='string'?x:x.id)===did)){
          const entry=typeof d==='object'?d:{id:did,text:byId[did]?byId[did].text:did};
          s.deleted.push(entry);
        }
      });
    }
    save(s);render();
    showToast('✅ 拉取成功，已同步归档与删除状态');
  }catch(e){showToast('❌ 拉取失败：'+e.message)}
}

let _pushData=null;
async function pushToGist(){
  const token=getGistToken();if(!token){alert('⚠️ 请先点击底部「⚙️ 设置Token」配置GitHub Token');return}
  const s=load();
  const confirmed=s.confirmedDone||{};
  const deleted=s.deleted||[];
  const names={};
  [...DEFAULT_TODOS,...(s.addedItems||[])].forEach(i=>names[i.id]=i.text);
  // Fetch remote state for diff
  let remoteConfirmed={},remoteDeleted=[];
  try{
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{'Authorization':`token ${token}`}});
    const d=await r.json();
    if(d.files[GIST_FILE])remoteConfirmed=JSON.parse(d.files[GIST_FILE].content);
    if(d.files[GIST_DELETED_FILE])remoteDeleted=JSON.parse(d.files[GIST_DELETED_FILE].content);
  }catch{}
  const remoteDelIds=new Set(remoteDeleted.map(d=>typeof d==='string'?d:d.id));
  const newConfirmed=Object.entries(confirmed).filter(([id])=>!remoteConfirmed[id]);
  const newDeleted=deleted.filter(d=>{const did=typeof d==='string'?d:d.id;return!remoteDelIds.has(did)});
  if(newConfirmed.length===0&&newDeleted.length===0){showToast('没有新的变更需要推送，云端已是最新');return}
  _pushData={confirmed,deleted,token};
  // Helper to get display text
  const getTxt=(id,entry)=>{if(typeof entry==='object'&&entry.text)return entry.text;return names[id]||id};
  const getDate=(id,entry)=>{if(typeof entry==='object')return entry.date||'';return entry||''};
  const getDelTxt=d=>{if(typeof d==='object'&&d.text)return d.text;return names[typeof d==='string'?d:d.id]||(typeof d==='string'?d:d.id)};
  let html='';
  if(newConfirmed.length>0){
    html+=`<div style="margin-bottom:10px;color:#34d399;font-weight:600">✅ 新增归档 ${newConfirmed.length} 项</div>`;
    html+=newConfirmed.map(([id,entry])=>`<div style="display:flex;align-items:center;gap:8px;padding:2px 0"><span style="color:#34d399">✅</span><span style="flex:1;color:#d1d5db">${esc(getTxt(id,entry))}</span><span style="color:#6b7280;font-size:12px">${getDate(id,entry)}</span></div>`).join('');
  }
  if(newDeleted.length>0){
    html+=`<div style="margin:10px 0 6px;color:#f87171;font-weight:600">🗑️ 新增删除 ${newDeleted.length} 项</div>`;
    html+=newDeleted.map(d=>`<div style="display:flex;align-items:center;gap:8px;padding:2px 0"><span style="color:#f87171">🗑️</span><span style="flex:1;color:#9ca3af;text-decoration:line-through">${esc(getDelTxt(d))}</span></div>`).join('');
  }
  document.getElementById('pushCount').textContent=`共 ${newConfirmed.length+newDeleted.length} 项变更待推送`;
  document.getElementById('pushList').innerHTML=html;
  document.getElementById('pushModal').classList.add('show');
}
function closePushConfirm(){document.getElementById('pushModal').classList.remove('show');_pushData=null}
async function doPush(){
  if(!_pushData)return;
  const{confirmed,deleted,token}=_pushData;
  closePushConfirm();
  try{
    // MERGE logic: fetch latest Gist state first, then merge local changes
    const fetchR=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{'Authorization':`token ${token}`}});
    if(!fetchR.ok)throw new Error('Fetch Gist failed: HTTP '+fetchR.status);
    const fetchD=await fetchR.json();
    let remoteConfirmed={},remoteDeleted=[];
    if(fetchD.files[GIST_FILE])remoteConfirmed=JSON.parse(fetchD.files[GIST_FILE].content);
    if(fetchD.files[GIST_DELETED_FILE])remoteDeleted=JSON.parse(fetchD.files[GIST_DELETED_FILE].content);
    // Merge confirmed: local into remote (additive, new format {date, text})
    const mergedConfirmed={...remoteConfirmed};
    for(const[id,entry]of Object.entries(confirmed)){
      if(typeof entry==='object'){mergedConfirmed[id]=entry}
      else if(typeof remoteConfirmed[id]==='object'){/* keep remote's richer data */}
      else{mergedConfirmed[id]=entry}
    }
    // Merge deleted: local into remote (additive, new format {id, text})
    const mergedDeletedMap={};
    remoteDeleted.forEach(d=>{const did=typeof d==='string'?d:d.id;mergedDeletedMap[did]=d});
    deleted.forEach(d=>{const did=typeof d==='string'?d:d.id;if(!mergedDeletedMap[did])mergedDeletedMap[did]=d});
    const files={};
    files[GIST_FILE]={content:JSON.stringify(mergedConfirmed,null,2)};
    files[GIST_DELETED_FILE]={content:JSON.stringify(Object.values(mergedDeletedMap),null,2)};
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({files})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    // Also sync localStorage with merged state
    const s=load();s.confirmedDone=mergedConfirmed;
    s.deleted=Object.values(mergedDeletedMap);
    save(s);render();
    showToast('✅ 推送成功！归档与删除已合并同步到云端');
  }catch(e){showToast('❌ 推送失败：'+e.message)}
}

/* ===== INIT: auto-sync from public Gist on first load ===== */
(async function(){
  // Initial render (shows only DEFAULT_TODOS immediately)
  render();
  // Fetch public Gist to sync confirmed_done + deleted_items for this browser
  try{
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}`);
    if(!r.ok)return;
    const d=await r.json();
    const s=load();
    if(!s.confirmedDone)s.confirmedDone={};
    if(!s.deleted)s.deleted=[];
    const all=[...DEFAULT_TODOS,...(s.addedItems||[])];
    const byId={};all.forEach(i=>byId[i.id]=i);
    let changed=false;
    // Sync confirmed_done (handle old string format and new {date,text} format)
    if(d.files[GIST_FILE]){
      const remote=JSON.parse(d.files[GIST_FILE].content);
      for(const[id,entry]of Object.entries(remote)){
        if(!s.confirmedDone[id]){
          if(typeof entry==='object'){s.confirmedDone[id]=entry}
          else{s.confirmedDone[id]={date:entry,text:byId[id]?byId[id].text:id}}
          changed=true;
        }
      }
    }
    // Sync deleted_items
    if(d.files[GIST_DELETED_FILE]){
      const remoteDel=JSON.parse(d.files[GIST_DELETED_FILE].content);
      remoteDel.forEach(item=>{
        const did=typeof item==='string'?item:item.id;
        if(!s.deleted.some(x=>(typeof x==='string'?x:x.id)===did)){
          const entry=typeof item==='object'?item:{id:did,text:byId[did]?byId[did].text:did};
          s.deleted.push(entry);changed=true;
        }
      });
    }
    if(changed){save(s);render()}
  }catch{}
})();
